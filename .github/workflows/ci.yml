name: CI

# Run lint + both test suites on every push and pull request.
on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Installs all workspaces from the single root lockfile.
      - name: Install dependencies
        run: npm ci

      # Web lint is now a HARD GATE. Phase D #16 (provider/hook cleanup) cleared
      # the last of the debt — 39 errors -> 0 — so continue-on-error is gone.
      # Keep it that way: a new lint error should fail the build, not pile up.
      - name: Lint (web)
        run: npm run lint --workspace apps/web

      # API lint IS a hard gate — the api baseline is clean (Phase C #11).
      - name: Lint (api)
        run: npm run lint --workspace apps/api

      - name: Test (web)
        run: npm run test --workspace apps/web

      # API tests are self-contained: in-memory Mongo + env set in-test. No secrets.
      - name: Test (api)
        run: npm run test --workspace apps/api
