server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The app is a client-side-routed SPA: every unknown path must fall through
    # to index.html, or a hard refresh on /chat or /users returns a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable; index.html must never be cached or
    # users keep booting an old bundle after a deploy.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
